general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = /home/Kandeel/.config/hypr/wallpapers/wallpaper.png   # Your astronaut wallpaper
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2 # 0 disables blurring
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME
label {
    monitor =
    text = $TIME
    color = rgba(143, 188, 187, 1.0) # Nord Frost Green
    font_size = 120
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -140
    halign = center
    valign = top
}

# USER
label {
    monitor =
    text = Hi there, $USER
    color = rgba(216, 222, 233, 1.0)
    font_size = 25
    font_family = JetBrainsMono Nerd Font
    position = 0, -40
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(59, 66, 82, 1.0) # Nord Polar Night
    inner_color = rgba(46, 52, 64, 1.0)
    font_color = rgba(236, 239, 244, 1.0)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
    fail_timeout = 2000         # Time to wait (in ms) after a wrong attempt. 2000 = 2 seconds.
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # Shows what went wrong and attempt count
    capslock_color = rgba(235, 203, 139, 1.0) # Nord Yellow for Caps Lock warning
}

# CURRENT LAYOUT (Crucial for your US/AR toggle)
label {
    monitor =
    text = $LAYOUT
    color = rgba(136, 192, 208, 1.0) # Nord Blue
    font_size = 15
    font_family = JetBrainsMono Nerd Font
    position = 0, -160
    halign = center
    valign = center
}
