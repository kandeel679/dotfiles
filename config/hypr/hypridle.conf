general {
    lock_cmd = pidof hyprlock || hyprlock       # Direct call to hyprlock
    before_sleep_cmd = pidof hyprlock || hyprlock 
    after_sleep_cmd = hyprctl dispatch dpms on  
}

# 1. Lock screen
listener {
    timeout = 300                                
    on-timeout = hyprlock                        # Directly triggers your lock screen
}

# 2. Turn off screen
listener {
    timeout = 330                                
    on-timeout = hyprctl dispatch dpms off       
    on-resume = hyprctl dispatch dpms on         
}
