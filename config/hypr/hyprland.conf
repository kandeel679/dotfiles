# #######################################################################################
# CUSTOM HYPRLAND CONFIG (Modern Structured Format)
# Updated from older Archcraft configuration
# #######################################################################################

################
### MONITORS ###
################

monitor=,preferred,auto,1


###################
### MY PROGRAMS ###
###################

$terminal = alacritty
$fileManager = thunar
$menu1 = xfce4-appfinder --collapsed
$menu2 = ~/.config/hypr/scripts/menu
$menu3 = xfce4-appfinder
$volume = ~/.config/hypr/scripts/volume
$backlight = ~/.config/hypr/scripts/brightness
$screenshot = grim -g "$(slurp)" - | wl-copy
$colorpicker = ~/.config/hypr/scripts/colorpicker
$editor = gnome-text-editor
$browser = zen-browser
$googleIDE = /home/Kandeel/Apps/antigravity/antigravity
$Netwrokmaneger = nmtui

#################
### AUTOSTART ###
#################

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprlock -c ~/.config/hypr/hyprlock.conf
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = ~/.config/hypr/scripts/startup


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 4

    col.active_border = rgba(B4A1DBff)
    col.inactive_border = rgba(343A40ff)


    resize_on_border = false
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 8

    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0

    shadow {
        enabled = false
    }

blur {
        enabled = true
        size = 8           # Higher = more blur area
        passes = 3         # Higher = more "iterations" (heavier blur)
        new_optimizations = true
        ignore_opacity = true # Essential: Blurs the background even if window is opaque
    }
}

animations {
    enabled = true

    animation = windows,1,8,default,popin 80%
    animation = fadeIn,1,8,default
    animation = fadeOut,1,8,default
    animation = workspaces,1,8,default
}

dwindle {
    pseudotile = false
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}


#############
### INPUT ###
#############


input {
    kb_layout = us,ara
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }

    numlock_by_default = true
}
gesture = 3, horizontal, workspace


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER


#powermenu
# Use SUPER + Airplane Mode Key for a custom action
# Power Controls
bind = $mainMod SHIFT, P, exec, systemctl poweroff
bind = $mainMod SHIFT, L, exec, systemctl suspend
bind = $mainMod SHIFT, R, exec, systemctl reboot, 


#Logout,exit 
bind = $mainMod, m, exit,
bind = $mainMod, L, exec, hyprlock -c ~/.config/hypr/hyprlock.conf

# Screenshot
bind = , Print, exec, $screenshot


#clipboard
bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Terminal
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Return, exec, $terminal -s
bind = $mainMod ALT, Return, exec, $terminal -f
bind = $mainMod, T, exec, $terminal -F

# Apps
bind = $mainMod SHIFT, F, exec, $fileManager
bind = $mainMod SHIFT, E, exec, $editor
bind = $mainMod SHIFT, W, exec, $browser
bind = $mainMod, A, exec, $googleIDE

# Launchers
bind = ALT, F1, exec, $menu1
bind = $mainMod, D, exec, $menu2
bind = ALT, F3, exec, $menu3

# Misc
bind = $mainMod, N, exec, nm-connection-editor
bind = $mainMod, P, exec, $colorpicker
bind = $mainMod SHIFT, N, exec, $terminal -e $Netwrokmaneger

# Window controls
bind = $mainMod, Q, killactive
bind = $mainMod, C, killactive
bind = CTRL ALT, Delete, exit
bind = $mainMod, F, fullscreen
bind = $mainMod, Space, togglefloating
bind = $mainMod, S, pseudo

# Use SUPER + = and SUPER + -
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t
# Brightness keys
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize
bind = $mainMod CTRL, left, resizeactive, -20 0
bind = $mainMod CTRL, right, resizeactive, 20 0
bind = $mainMod CTRL, up, resizeactive, 0 -20
bind = $mainMod CTRL, down, resizeactive, 0 20

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = ALT, 1, movetoworkspace, 1
bind = ALT, 2, movetoworkspace, 2
bind = ALT, 3, movetoworkspace, 3
bind = ALT, 4, movetoworkspace, 4
bind = ALT, 5, movetoworkspace, 5
bind = ALT, 6, movetoworkspace, 6
bind = ALT, 7, movetoworkspace, 7
bind = ALT, 8, movetoworkspace, 8
bind = ALT, 9, movetoworkspace, 9
bind = ALT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


##############################
### WINDOWS AND WORKSPACES ###
##############################

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Floating apps
windowrule {
    name = floating-apps
    match:class = ^(foot-float|yad|nm-connection-editor|pavucontrolk|xfce-polkit|kvantummanager|qt5ct|feh|Viewnior|Gpicview|Gimp|nomacs|VirtualBox Manager|qemu|Qemu-system-x86_64|xfce4-appfinder)$
    float = true
}

# Fullscreen floating terminal
windowrule {
    name = foot-fullscreen
    match:class = ^foot-full$
    float = true
    move = 0 0
    size = 100% 100%
}

# Wlogout
windowrule {
    name = wlogout-fullscreen
    match:class = ^wlogout$
    float = true
    move = 0 0
    size = 100% 100%
    animation = slide
}
